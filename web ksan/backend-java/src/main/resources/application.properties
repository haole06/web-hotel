spring.application.name=backend-java 

# 1. Ép Java chạy ở cổng 5000 (để khớp với code giao diện React cũ)
server.port=5000

# 2. Cấu hình kết nối MySQL (trỏ vào database qly ở cổng 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/qly?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password= 123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Cấu hình Hibernate (Công cụ biến Class thành Bảng)
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Ép Java dùng chính xác tên cột, KHÔNG được tự ý thêm dấu gạch dưới
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Cấm Java không được tự ý sửa đổi/đẻ thêm cột linh tinh vào Database
spring.jpa.hibernate.ddl-auto=none 